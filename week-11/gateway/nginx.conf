events {
    worker_connections 1024;
}

http {
    # Логирование для отладки
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Upstream для сервиса сообщений
    upstream messages_service {
        server messages-svc-s03:8213;
    }

    server {
        listen 8080;
        
        # Корневой маршрут для проверки
        location / {
            return 200 "API Gateway for messages service is running!\n";
        }

        # Маршрут для messages (ваш основной ресурс)
        location /api/messages {
            proxy_pass http://messages_service/api/messages;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Маршрут для конкретного сообщения по ID
        location /api/messages/ {
            proxy_pass http://messages_service/api/messages/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            return 200 "Gateway is healthy\n";
        }
    }
}