name: CI/CD Pipeline for notifications-s03

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  WEEK: "14"
  GROUP: "432"
  STUDENT_ID: "s03"
  PROJECT_CODE: "notifications-s03"
  IMAGE_NAME: "notifications-svc-s03"
  DOCKER_HUB_REPO: "tayavoin/notifications-svc-s03"

jobs:
  tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov  # добавим линтер и pytest
          
      - name: Lint with flake8
        run: |
          # проверка синтаксических ошибок
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # проверка стиля (опционально)
          flake8 . --count --exit-zero --max-complexity=10 --statistics
          
      - name: Run tests
        run: make test WEEK=${{ env.WEEK }}
        
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache
          retention-days: 7
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./weeks/week-14
          file: ./weeks/week-14/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Test Docker image
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:test python -c "import app.main; print('OK')"
          
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp weeks/week-14/report.md artifacts/ || true
          cp weeks/week-14/questions.md artifacts/ || true
          cp coverage.xml artifacts/ || true
          docker save ${{ env.IMAGE_NAME }}:test -o artifacts/image.tar || true
          
      - name: Publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts
          
      - name: Log in to Docker Hub (optional - for push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push production image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./weeks/week-14
          file: ./weeks/week-14/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_HUB_REPO }}:latest
            ${{ env.DOCKER_HUB_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max