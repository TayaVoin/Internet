# Количество реплик
replicaCount: 1

# Настройки образа
image:
  repository: tickets-svc-s03  # имя образа
  tag: "latest"                 # тег по умолчанию
  pullPolicy: IfNotPresent

# Настройки сервиса
service:
  port: 8264                     # порт из варианта
  type: ClusterIP

# Ресурсы (requests/limits)
resources:
  requests:
    memory: "128Mi"
    cpu: "250m"
  limits:
    memory: "256Mi"
    cpu: "500m"

# Пробы
probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

# Переменные окружения
env:
  - name: SERVICE_NAME
    value: "tickets-svc-s03"
  - name: SERVICE_PORT
    value: "8264"
  - name: LOG_LEVEL
    value: "info"